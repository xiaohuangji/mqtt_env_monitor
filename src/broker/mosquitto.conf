# Mosquitto 对外服务配置(ESP32 接入用,Issue #34)
#
# 默认配置下 Mosquitto 只监听 localhost,局域网设备(ESP32)连不进来;
# 本配置开放 0.0.0.0:1883 并允许匿名连接(局域网演示环境)。
#
# 启动方式(Windows,在仓库根目录):
#   & "C:\Program Files\mosquitto\mosquitto.exe" -c src\broker\mosquitto.conf -v
#
# 防火墙放行(管理员 PowerShell,一次性):
#   netsh advfirewall firewall add rule name="MQTT 1883" dir=in action=allow protocol=TCP localport=1883
#
# 联调拓扑:笔记本开 Windows 移动热点(设置 → 网络和 Internet → 移动热点),
# 热点网段下笔记本 IP 固定为 192.168.137.1,即 ESP32 固件中的 Broker 地址。

listener 1883 0.0.0.0
allow_anonymous true

# 演示期匿名;如需加固,改用密码文件:
#   password_file src/broker/passwd
#   allow_anonymous false
# 生成密码文件: mosquitto_passwd -c src/broker/passwd <用户名>
