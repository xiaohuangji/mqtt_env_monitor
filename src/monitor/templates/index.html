<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MQTT 多节点环境监测 · Web 监控端</title>
<style>
  :root {
    --bg: #0e141b; --card: #151d26; --card2: #1a2430; --line: #243140;
    --txt: #e6edf3; --txt2: #8b98a9; --txt3: #5d6b7c;
    --blue: #4aa8ff; --green: #00d68f; --purple: #b39cf7; --orange: #ffb020; --red: #ff6b6b; --cyan: #3fd2e0;
  }
  * { box-sizing: border-box; }
  body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; margin: 0; background: var(--bg); color: var(--txt); }

  .topbar { display: flex; align-items: center; gap: 10px; padding: 14px 26px; border-bottom: 1px solid var(--line);
            background: linear-gradient(180deg, #121a23, #0e141b); position: sticky; top: 0; z-index: 10; }
  .logo { width: 10px; height: 10px; border-radius: 3px; background: var(--green); box-shadow: 0 0 10px var(--green);
          animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  .topbar h1 { font-size: 16px; margin: 0; font-weight: 600; }
  .topbar .sub { font-size: 12px; color: var(--txt2); margin-left: 6px; }
  .topbar a { margin-left: auto; color: var(--blue); text-decoration: none; font-size: 13px; }

  .wrap { max-width: 1480px; margin: 0 auto; padding: 18px 22px 50px; display: flex; flex-direction: column; gap: 14px; }

  .metabar { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 22px; font-size: 13px; color: var(--txt2); }
  .metabar b { color: var(--txt); font-weight: 600; font-variant-numeric: tabular-nums; }
  .conn { display: inline-flex; align-items: center; gap: 6px; padding: 3px 11px; border-radius: 999px; font-size: 12.5px; font-weight: 600; }
  .conn i { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .conn.ok { color: var(--green); background: rgba(0,214,143,.12); border: 1px solid rgba(0,214,143,.30); }
  .conn.bad { color: var(--red); background: rgba(255,107,107,.12); border: 1px solid rgba(255,107,107,.30); }

  .subbar { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 14px; font-size: 13px; color: var(--txt2); }
  .subbar label { display: inline-flex; align-items: center; gap: 6px; }
  .subbar select { background: var(--card2); color: var(--txt); border: 1px solid var(--line); border-radius: 7px; padding: 4px 9px; font-size: 13px; }
  .subbar select:focus { outline: none; border-color: var(--blue); }
  .subbar .flt { color: var(--cyan); background: rgba(63,210,224,.08); border: 1px solid var(--line); border-radius: 6px; padding: 3px 9px; font-size: 12.5px; font-family: ui-monospace, Consolas, monospace; }

  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; }
  .kpi { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px 18px; }
  .kpi .t { font-size: 12px; color: var(--txt2); margin-bottom: 7px; }
  .kpi .v { font-size: 28px; font-weight: 700; color: var(--c); line-height: 1.15; font-variant-numeric: tabular-nums; }
  .kpi .d { font-size: 11.5px; color: var(--txt3); margin-top: 5px; }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; }
  .card h3 { font-size: 13px; color: var(--txt2); font-weight: 600; margin: 0 0 12px; letter-spacing: .06em;
             display: flex; align-items: center; gap: 8px; }
  .livedot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green);
             animation: pulse 1.8s ease-in-out infinite; }

  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 10px 12px; text-align: left; font-size: 13.5px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  th { color: var(--txt2); font-weight: 500; font-size: 12.5px; letter-spacing: .04em; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background .15s; }
  tbody tr:hover { background: rgba(74,168,255,.05); }
  td.node { font-weight: 600; color: var(--txt); }
  td.val { font-size: 16px; font-weight: 700; color: var(--cyan); font-variant-numeric: tabular-nums; }
  td.dim { color: var(--txt3); font-variant-numeric: tabular-nums; }
  tr.stale td { color: var(--txt3); }
  tr.stale td.val { color: var(--txt3); }
  .tdot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
  .ttype { color: var(--txt); }
  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .pill i { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .pill.on { color: var(--green); background: rgba(0,214,143,.12); border: 1px solid rgba(0,214,143,.30); }
  .pill.off { color: var(--txt2); background: rgba(139,152,169,.10); border: 1px solid rgba(139,152,169,.25); }
  .empty { text-align: center; color: var(--txt3); padding: 34px 0; font-size: 14px; }

  .foot { font-size: 12px; color: var(--txt3); line-height: 1.8; }
</style>
</head>
<body>
<div class="topbar">
  <div class="logo"></div>
  <h1>基于 MQTT 的多节点环境监测系统 · Web 监控端</h1>
  <a href="/calculator">需求计算器 →</a>
</div>

<div class="wrap">
  <div class="metabar">
    <span>MQTT Broker <b id="broker">-</b></span>
    <span>订阅主题 <b id="topic">-</b></span>
    <span class="conn bad" id="conn"><i></i> 连接中…</span>
  </div>

  <div class="subbar">
    <span>选择订阅</span>
    <label>节点 <select id="selNode"><option value="+">全部</option></select></label>
    <label>数据类型 <select id="selType"><option value="+">全部</option></select></label>
    <span class="flt" id="filterShow">env_monitor/+/+</span>
  </div>

  <div class="kpis">
    <div class="kpi" style="--c:var(--green)"><div class="t">在线节点</div><div class="v" id="nodes">0</div>
      <div class="d">超过 <span id="threshold">15</span> 秒无数据判离线</div></div>
    <div class="kpi" style="--c:var(--blue)"><div class="t">数据点</div><div class="v" id="points">0</div>
      <div class="d">当前节点 × 数据类型组合</div></div>
    <div class="kpi" style="--c:var(--purple)"><div class="t">已接收消息</div><div class="v" id="count">0</div>
      <div class="d">累计 publish 到达</div></div>
    <div class="kpi" style="--c:var(--red)"><div class="t">无效消息</div><div class="v" id="invalid">0</div>
      <div class="d">解析失败 / 丢弃</div></div>
  </div>

  <div class="card">
    <h3>实时数据 <span class="livedot"></span></h3>
    <table>
      <thead>
        <tr>
          <th>节点编号</th><th>数据类型</th><th>数据值</th><th>单位</th>
          <th>上传时间</th><th>接收时间</th><th>序号</th><th>状态</th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr><td class="empty" colspan="8">暂未收到数据，等待节点上传…</td></tr>
      </tbody>
    </table>
  </div>

  <p class="foot">说明：内部解析使用英文字段，页面按映射表显示中文数据类型，未配置中文名称的类型直接显示英文标识。
  超过 <span id="threshold2">15</span> 秒未收到某节点某类数据时，对应行标记为“离线/过期”。</p>
</div>

<script>
  const entries = new Map();
  let typeNames = {};
  let offlineAfter = 15;
  let clockOffset = 0;
  let receivedTotal = 0;
  let invalidTotal = 0;

  const TYPE_COLOR = {
    temperature: "#ff6b6b", humidity: "#4aa8ff", light: "#ffb020", noise: "#b39cf7",
    mq2_gas: "#3fd2e0", smoke: "#3fd2e0", soil_moisture: "#00d68f", pressure: "#b39cf7",
    co2: "#ffb020", pm25: "#ff6b6b",
  };

  function entryKey(e) { return e.node_id + "|" + e.data_type; }
  function nowEpoch() { return Date.now() / 1000 + clockOffset; }
  function setText(id, text) { const el = document.getElementById(id); if (el) el.textContent = text; }
  function shortTime(iso) {
    if (!iso) return "-";
    const m = String(iso).match(/T(\d{2}:\d{2}:\d{2})/);
    return m ? m[1] : String(iso);
  }

  function setConn(text, ok) {
    const el = document.getElementById("conn");
    el.className = "conn " + (ok ? "ok" : "bad");
    el.innerHTML = '<i></i> ' + text;
  }

  function applySnapshot(snap) {
    typeNames = snap.type_names || {};
    offlineAfter = snap.offline_after;
    clockOffset = snap.server_now - Date.now() / 1000;
    receivedTotal = snap.received_total;
    invalidTotal = snap.invalid_total;
    entries.clear();
    snap.entries.forEach((e) => entries.set(entryKey(e), e));
    setText("broker", snap.broker);
    setText("topic", snap.topic);
    setText("threshold", offlineAfter);
    setText("threshold2", offlineAfter);
    render();
  }

  function applyUpdate(update) {
    entries.set(entryKey(update.entry), update.entry);
    receivedTotal = update.received_total;
    render();
  }

  function render() {
    const tbody = document.getElementById("rows");
    tbody.replaceChildren();

    const sorted = Array.from(entries.values()).sort((a, b) =>
      a.node_id === b.node_id
        ? String(a.data_type).localeCompare(String(b.data_type))
        : String(a.node_id).localeCompare(String(b.node_id))
    );

    if (sorted.length === 0) {
      const tr = document.createElement("tr");
      const td = document.createElement("td");
      td.className = "empty";
      td.colSpan = 8;
      td.textContent = "暂未收到数据，等待节点上传…";
      tr.appendChild(td);
      tbody.appendChild(tr);
    }

    const onlineNodes = new Set();
    sorted.forEach((e) => {
      const age = nowEpoch() - e.received_epoch;
      const stale = age > offlineAfter;
      if (!stale) onlineNodes.add(e.node_id);

      const tr = document.createElement("tr");
      if (stale) tr.className = "stale";

      // 节点编号
      const tdNode = document.createElement("td"); tdNode.className = "node"; tdNode.textContent = e.node_id; tr.appendChild(tdNode);

      // 数据类型（带颜色点）
      const tdType = document.createElement("td");
      const color = TYPE_COLOR[e.data_type] || "#8b98a9";
      const dot = document.createElement("span"); dot.className = "tdot"; dot.style.background = color;
      const tname = document.createElement("span"); tname.className = "ttype";
      tname.textContent = typeNames[e.data_type] || e.data_type;
      tdType.appendChild(dot); tdType.appendChild(tname); tr.appendChild(tdType);

      // 数据值
      const tdVal = document.createElement("td"); tdVal.className = "val";
      tdVal.textContent = (e.value === null || e.value === undefined) ? "-" : String(e.value);
      tr.appendChild(tdVal);

      // 单位 / 上传 / 接收 / 序号
      const cells = [
        [e.unit || "-", "dim"],
        [shortTime(e.timestamp), "dim"],
        [shortTime(e.received_at), "dim"],
        [(e.seq === null || e.seq === undefined) ? "-" : String(e.seq), "dim"],
      ];
      cells.forEach(([text, cls]) => {
        const td = document.createElement("td"); td.className = cls; td.textContent = text; tr.appendChild(td);
      });

      // 状态药丸
      const tdStatus = document.createElement("td");
      const pill = document.createElement("span");
      pill.className = "pill " + (stale ? "off" : "on");
      pill.innerHTML = '<i></i>' + (stale ? "离线/过期" : "在线");
      tdStatus.appendChild(pill); tr.appendChild(tdStatus);

      tbody.appendChild(tr);
    });

    setText("count", receivedTotal);
    setText("invalid", invalidTotal);
    setText("nodes", onlineNodes.size);
    setText("points", sorted.length);
  }

  // Re-render every second so status flips to stale without new messages.
  setInterval(render, 1000);

  // ---- 选择订阅：按所选主题过滤重连 SSE（后端按 MQTT 通配过滤该连接）----
  let source = null;
  function currentFilter() {
    const n = document.getElementById("selNode").value || "+";
    const d = document.getElementById("selType").value || "+";
    return "env_monitor/" + n + "/" + d;
  }
  function connect(filter) {
    if (source) source.close();
    entries.clear();
    render();
    source = new EventSource("/stream?filter=" + encodeURIComponent(filter));
    source.addEventListener("snapshot", (ev) => applySnapshot(JSON.parse(ev.data)));
    source.addEventListener("update", (ev) => applyUpdate(JSON.parse(ev.data)));
    source.onopen = () => setConn("已连接", true);
    source.onerror = () => setConn("连接中断，自动重连中…", false);
  }
  function applyFilter() {
    const f = currentFilter();
    document.getElementById("filterShow").textContent = f;
    connect(f);
  }
  document.getElementById("selNode").addEventListener("change", applyFilter);
  document.getElementById("selType").addEventListener("change", applyFilter);

  function fillTypeOptions(typeNamesObj) {
    const sel = document.getElementById("selType");
    const have = new Set(Array.from(sel.options).map((o) => o.value));
    Object.keys(typeNamesObj || {}).forEach((k) => {
      if (!have.has(k)) {
        const o = document.createElement("option");
        o.value = k; o.textContent = (typeNamesObj[k] || k);
        sel.appendChild(o);
      }
    });
  }
  // 节点/类型选项来自全量快照（/api/data，不受当前过滤影响），定期刷新
  async function refreshOptions() {
    try {
      const data = await (await fetch("/api/data")).json();
      fillTypeOptions(data.type_names);
      const sel = document.getElementById("selNode");
      const have = new Set(Array.from(sel.options).map((o) => o.value));
      Array.from(new Set((data.entries || []).map((e) => e.node_id))).sort().forEach((n) => {
        if (!have.has(n)) {
          const o = document.createElement("option");
          o.value = n; o.textContent = n;
          sel.appendChild(o);
        }
      });
    } catch (e) { /* ignore */ }
  }
  refreshOptions();
  setInterval(refreshOptions, 5000);

  connect(currentFilter());
</script>
</body>
</html>
